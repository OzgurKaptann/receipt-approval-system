name: receipt-approval-system

services:
  db:
    image: postgres:16
    container_name: ras_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
    container_name: ras_api
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
      FX_PROVIDER: TCMB
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - storage:/storage
    command: ["bash","-lc","uvicorn app.main:app --host 0.0.0.0 --port 8000"]

  redis:
    image: redis:7
    container_name: ras_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  celery_worker:
    build:
      context: ./api
    container_name: ras_worker
    env_file:
      - ./.env
    environment:
      REDIS_URL: redis://redis:6379/0
      FX_PROVIDER: TCMB
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - storage:/storage
    command: ["bash", "-lc", "celery -A app.worker.celery_app worker --loglevel=info"]

volumes:
  pgdata:
  storage: