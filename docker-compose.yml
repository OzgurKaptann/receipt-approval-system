name: receipt-approval-system

services:
  db:
    image: postgres:16
    container_name: ras_db
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U  -d "]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./api
    container_name: ras_api
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - storage:/storage
    command: ["bash","-lc","uvicorn app.main:app --host 0.0.0.0 --port 8000"]

volumes:
  pgdata:
  storage:
